name: Build Unsigned IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build iOS unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: List schemes
        run: |
          xcodebuild -list -project StudyLog.xcodeproj

      - name: Build unsigned app
        run: |
          set -e

          xcodebuild \
            -project StudyLog.xcodeproj \
            -scheme StudyLog \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            clean build

      - name: Package unsigned IPA
        run: |
          set -e

          APP_PATH="$PWD/build/StudyLog.app"
          IPA_NAME="StudyLog-unsigned.ipa"

          if [ ! -d "$APP_PATH" ]; then
            echo "App not found: $APP_PATH"
            exit 1
          fi

          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          /usr/bin/zip -qry "$IPA_NAME" Payload

          echo "Created $IPA_NAME"
          ls -lh "$IPA_NAME"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: StudyLog-unsigned-ipa
          path: StudyLog-unsigned.ipa
          retention-days: 7
